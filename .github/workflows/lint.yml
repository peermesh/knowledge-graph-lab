name: Code Quality & Linting

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  python-lint:
    name: Python Linting
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, 3.10.x, 3.11]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy pytest
        # Install project dependencies
        if [ -f modules/module-1-ingestion/requirements.txt ]; then pip install -r modules/module-1-ingestion/requirements.txt; fi
        if [ -f modules/module-2-knowledge-graph/requirements.txt ]; then pip install -r modules/module-2-knowledge-graph/requirements.txt; fi
        if [ -f modules/module-3-reasoning/requirements.txt ]; then pip install -r modules/module-3-reasoning/requirements.txt; fi
    
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 modules/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings. GitHub editor is 127 chars wide
        flake8 modules/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Check code formatting with black
      run: |
        black --check --diff modules/ || echo "::warning::Code formatting issues found. Run 'black modules/' to fix."
    
    - name: Check import sorting with isort
      run: |
        isort --check-only --diff modules/ || echo "::warning::Import sorting issues found. Run 'isort modules/' to fix."
    
    - name: Type checking with mypy
      run: |
        mypy modules/ --ignore-missing-imports --no-strict-optional || echo "::warning::Type checking issues found."
      continue-on-error: true

  javascript-lint:
    name: JavaScript/Node.js Linting  
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'
        cache-dependency-path: 'modules/module-4-frontend/package-lock.json'
    
    - name: Install Node.js dependencies
      working-directory: modules/module-4-frontend
      run: |
        npm ci
        # Install additional linting tools if not in package.json
        npm install --save-dev eslint prettier @typescript-eslint/eslint-plugin @typescript-eslint/parser
    
    - name: Lint JavaScript/TypeScript with ESLint
      working-directory: modules/module-4-frontend
      run: |
        npx eslint . --ext .js,.jsx,.ts,.tsx --max-warnings 0 || echo "::warning::ESLint issues found. Run 'npm run lint:fix' to attempt auto-fixes."
    
    - name: Check code formatting with Prettier
      working-directory: modules/module-4-frontend
      run: |
        npx prettier --check . || echo "::warning::Prettier formatting issues found. Run 'npm run format' to fix."
    
    - name: Type checking with TypeScript
      working-directory: modules/module-4-frontend
      run: |
        npx tsc --noEmit || echo "::warning::TypeScript type checking issues found."
      continue-on-error: true

  markdown-lint:
    name: Markdown & Documentation Linting
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Lint Markdown files
      uses: DavidAnson/markdownlint-cli2-action@v13
      with:
        globs: |
          **/*.md
          !node_modules/**
          !.git/**

  docker-lint:
    name: Docker Linting
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Lint Dockerfiles with hadolint
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: modules/*/Dockerfile
        recursive: true

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Bandit Security Linter (Python)
      run: |
        pip install bandit
        bandit -r modules/ -f json -o bandit-report.json || echo "::warning::Security issues found in Python code."
      continue-on-error: true
    
    - name: Upload Bandit Report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: bandit-security-report
        path: bandit-report.json

  test-templates:
    name: Validate Test Templates
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python for test validation
      uses: actions/setup-python@v4
      with:
        python-version: 3.11
    
    - name: Install test dependencies
      run: |
        pip install pytest pytest-asyncio networkx pandas
    
    - name: Validate Python test templates
      run: |
        # Run syntax check on test templates
        python -m py_compile modules/module-1-ingestion/tests/test_template.py
        python -m py_compile modules/module-2-knowledge-graph/tests/test_template.py
        python -m py_compile modules/module-3-reasoning/tests/test_template.py
        echo "✅ All Python test templates have valid syntax"
    
    - name: Set up Node.js for frontend test validation
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
    
    - name: Validate JavaScript test template
      working-directory: modules/module-4-frontend
      run: |
        npm install
        # Check if test template has valid syntax
        node -c tests/test_template.js
        echo "✅ JavaScript test template has valid syntax"

  summary:
    name: Linting Summary
    runs-on: ubuntu-latest
    needs: [python-lint, javascript-lint, markdown-lint, docker-lint, security-scan, test-templates]
    if: always()
    
    steps:
    - name: Summary Report
      run: |
        echo "## 🔍 Code Quality & Linting Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Python Linting | ${{ needs.python-lint.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| JavaScript Linting | ${{ needs.javascript-lint.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Markdown Linting | ${{ needs.markdown-lint.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Docker Linting | ${{ needs.docker-lint.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Security Scanning | ${{ needs.security-scan.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Test Templates | ${{ needs.test-templates.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📋 Next Steps for Contributors" >> $GITHUB_STEP_SUMMARY
        echo "- Review any warnings or errors in the job logs above" >> $GITHUB_STEP_SUMMARY
        echo "- Run \`./scripts/lint_check.sh\` locally before pushing" >> $GITHUB_STEP_SUMMARY
        echo "- Use the test templates in \`modules/*/tests/test_template.*\` as starting points" >> $GITHUB_STEP_SUMMARY